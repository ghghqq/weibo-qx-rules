[rewrite_local]
# Main startup ad decision chain
^https?:\/\/bootpreload\.uve\.weibo\.com\/v2\/ad\/preload url script-response-body file:///Users/taoxiaofeng/Documents/Playground/weibo_ad_cleanup.js
^https?:\/\/wbapp\.uve\.weibo\.com\/wbapplua\/wbpullad\.lua url script-response-body file:///Users/taoxiaofeng/Documents/Playground/weibo_ad_cleanup.js
^https?:\/\/adstrategy\.biz\.weibo\.com\/v3\/strategy\/ad url script-response-body file:///Users/taoxiaofeng/Documents/Playground/weibo_ad_cleanup.js

# Reporting endpoints, safe to drop in most cases
^https?:\/\/sdkmonitor\.biz\.weibo\.com\/expose-monitor url reject
